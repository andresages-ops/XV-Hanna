<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Panel Organizador - XV Hanna</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Segoe+UI:wght@400;600;700;800;900&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        "fondo-app": "#F5E1E1",     
                        "tarjeta": "#FDF5F5",       
                        "tarjeta-fuerte": "#EAC6C6",
                        "texto-oscuro": "#4A3B3B",  
                        "acento-verde": "#D5E3D1",  
                        "alerta-roja": "#E8B4B4",   
                        "advertencia": "#FF8C42", 
                    },
                    fontFamily: { "sans": ["Segoe UI", "sans-serif"] }
                }
            }
        }
    </script>

    <style>
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        body { min-height: 100dvh; overflow-x: hidden; overscroll-behavior-y: contain; } 
        .expand-transition { transition: max-height 0.3s ease-in-out, opacity 0.3s ease-in-out; overflow: hidden; }
        .filter-transition { transition: all 0.3s ease; }
        #pull-to-refresh { transition: height 0.2s ease-out; }
    </style>
</head>

<body class="bg-fondo-app font-sans flex flex-col text-texto-oscuro antialiased">

    <div id="pull-to-refresh" class="w-full flex items-center justify-center bg-fondo-app overflow-hidden h-0 text-texto-oscuro/60 text-sm font-bold gap-2">
        <svg id="ptr-icon" class="w-5 h-5 transition-transform duration-300" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M19 14l-7 7m0 0l-7-7m7 7V3"></path></svg>
        <span id="ptr-text">Desliza para actualizar...</span>
    </div>

    <header class="flex items-center justify-between px-6 pt-6 pb-4 relative z-20">
        <h1 class="text-2xl font-extrabold text-texto-oscuro">Panel Organizador</h1>
        <div class="flex items-center gap-2">
            <button onclick="descargarExcel()" class="w-10 h-10 rounded-full border border-texto-oscuro/10 flex items-center justify-center hover:bg-white/50 transition shadow-sm text-texto-oscuro bg-tarjeta/40" title="Descargar Asistentes">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path></svg>
            </button>
            <button onclick="cargarDatos()" class="w-10 h-10 rounded-full border border-texto-oscuro/10 flex items-center justify-center hover:bg-white/50 transition shadow-sm text-texto-oscuro bg-tarjeta/40" title="Actualizar">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path></svg>
            </button>
        </div>
    </header>

    <main class="px-5 pb-10">
        
        <div id="card-asiste" onclick="filtrarPorEstatus('Asiste')" class="filter-transition bg-tarjeta-fuerte rounded-[40px] p-8 shadow-sm mb-4 relative overflow-hidden min-h-[190px] flex flex-col justify-center cursor-pointer hover:shadow-md transform">
            <div class="flex items-center gap-2 mb-2">
                <p class="text-[12px] font-bold tracking-widest text-texto-oscuro/70 uppercase">Total Asistentes</p>
                <span id="badge-asiste" class="bg-white text-texto-oscuro text-[9px] font-bold px-2 py-0.5 rounded-full shadow-sm hidden uppercase tracking-wider">Activo</span>
            </div>
            
            <div class="flex items-center justify-between z-10 relative">
                <span class="text-7xl font-black text-texto-oscuro tracking-tighter" id="stat-total-personas">0</span>
                <div class="w-16 h-16 bg-tarjeta/40 rounded-2xl flex items-center justify-center mr-4 shadow-sm">
                    <svg class="w-9 h-9 text-texto-oscuro" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0zm6 3a2 2 0 11-4 0 2 2 0 014 0zM7 10a2 2 0 11-4 0 2 2 0 014 0z"></path></svg>
                </div>
            </div>

            <div id="avatares-confirmados" class="mt-4 flex items-center -space-x-2 relative z-10"></div>
            <div id="flecha-asiste" class="absolute top-7 right-7 text-texto-oscuro/40">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M9 5l7 7-7 7"></path></svg>
            </div>
        </div>

        <div id="card-no-asiste" onclick="filtrarPorEstatus('No Asiste')" class="filter-transition bg-tarjeta rounded-[35px] p-6 shadow-sm mb-6 flex items-center justify-between relative border border-white/40 cursor-pointer hover:shadow-md transform">
            <div>
                <div class="flex items-center gap-2 mb-1">
                    <p class="text-[10px] font-bold tracking-widest text-texto-oscuro/60 uppercase">No Asistirán</p>
                    <span id="badge-no-asiste" class="bg-alerta-roja text-texto-oscuro text-[8px] font-bold px-2 py-0.5 rounded-full shadow-sm hidden uppercase tracking-wider">Activo</span>
                </div>
                <span class="text-4xl font-bold text-alerta-roja" id="stat-cancelados">0</span>
            </div>
            
            <div class="w-14 h-14 bg-alerta-roja/20 rounded-2xl flex items-center justify-center text-alerta-roja mr-8 shadow-sm">
                <svg class="w-7 h-7" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M6 18L18 6M6 6l12 12"></path></svg>
            </div>
            <div id="flecha-no-asiste" class="absolute top-5 right-5 text-texto-oscuro/30">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M9 5l7 7-7 7"></path></svg>
            </div>
        </div>

        <div class="mb-6 flex items-center gap-3">
            <div class="relative flex-1 flex items-center">
                <svg class="w-5 h-5 absolute left-4 text-texto-oscuro/40" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
                <input type="text" id="buscador" oninput="manejarBusqueda()" placeholder="Buscar invitado..." class="w-full bg-tarjeta rounded-full py-3.5 pl-12 pr-10 text-texto-oscuro focus:outline-none shadow-sm border border-white/50 focus:border-texto-oscuro/20 transition placeholder-texto-oscuro/40 text-[15px]">
                <button id="btn-borrar-busqueda" onclick="limpiarBusqueda()" class="absolute right-3 hidden text-texto-oscuro/30 hover:text-texto-oscuro/70 transition p-1 bg-texto-oscuro/5 rounded-full">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M6 18L18 6M6 6l12 12"></path></svg>
                </button>
            </div>
            <button id="btn-orden" onclick="alternarOrden()" class="w-[52px] h-[52px] rounded-full bg-tarjeta shadow-sm border border-white/50 flex-shrink-0 flex items-center justify-center text-texto-oscuro hover:bg-white transition relative">
                <svg class="w-6 h-6 opacity-70" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
            </button>
        </div>

        <div class="flex justify-between items-end mb-4 px-2">
            <h2 class="font-bold text-lg text-texto-oscuro" id="titulo-lista">Registro de Invitados</h2>
            <span class="text-[11px] font-semibold text-texto-oscuro/60" id="contador-resultados">0 encontrados</span>
        </div>

        <div id="lista-invitados" class="space-y-4">
            <p class="text-center text-sm opacity-60 py-10">Cargando...</p>
        </div>
    </main>

    <div id="modal-editar" class="fixed inset-0 bg-texto-oscuro/80 hidden z-50 flex items-end sm:items-center justify-center p-0 sm:p-4 transition-opacity pb-0">
        <div class="bg-tarjeta rounded-t-[35px] sm:rounded-[35px] w-full max-w-md p-6 sm:p-8 shadow-2xl max-h-[90vh] overflow-y-auto hide-scrollbar">
            <div class="w-12 h-1.5 bg-texto-oscuro/20 rounded-full mx-auto mb-6 sm:hidden"></div>
            <div class="flex justify-between items-center mb-6">
                <h2 class="font-bold text-xl text-texto-oscuro">Ajustar Registro</h2>
                <button onclick="cerrarModal()" class="w-8 h-8 bg-fondo-app rounded-full flex items-center justify-center text-texto-oscuro hover:bg-alerta-roja transition">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                </button>
            </div>
            <form id="form-editar" class="space-y-4">
                <input type="hidden" id="edit-fila">
                <div>
                    <label class="block text-[10px] font-bold tracking-wider mb-1 opacity-60 uppercase ml-1">Nombre Principal</label>
                    <input type="text" id="edit-nombre" class="w-full bg-white rounded-2xl p-4 focus:outline-none border border-texto-oscuro/10 focus:border-texto-oscuro/30 shadow-sm text-[15px] font-semibold text-texto-oscuro">
                </div>
                <div>
                    <label class="block text-[10px] font-bold tracking-wider mb-1 opacity-60 uppercase ml-1">Estatus</label>
                    <select id="edit-estatus" class="w-full bg-white rounded-2xl p-4 focus:outline-none border border-texto-oscuro/10 focus:border-texto-oscuro/30 shadow-sm text-[15px] font-semibold text-texto-oscuro">
                        <option value="Asiste">Sí Asistirá</option>
                        <option value="No Asiste">No Asistirá</option>
                    </select>
                </div>
                <div>
                    <label class="block text-[10px] font-bold tracking-wider mb-1 opacity-60 uppercase ml-1">Lugares Extras</label>
                    <select id="edit-acompanantes" onchange="generarCamposAcompanantes()" class="w-full bg-white rounded-2xl p-4 focus:outline-none border border-texto-oscuro/10 focus:border-texto-oscuro/30 shadow-sm text-[15px] font-semibold text-texto-oscuro">
                        <option value="0">0 (Solo titular)</option>
                        <option value="1">1 Extra</option><option value="2">2 Extras</option>
                        <option value="3">3 Extras</option><option value="4">4 Extras</option>
                        <option value="5">5 Extras</option><option value="6">6 Extras</option>
                        <option value="7">7 Extras</option><option value="8">8 Extras</option>
                        <option value="9">9 Extras</option>
                    </select>
                </div>
                <div id="edit-nombres-acompanantes" class="space-y-2 bg-fondo-app/40 p-4 rounded-[20px] border border-white/50 hidden"></div>
                <div>
                    <label class="block text-[10px] font-bold tracking-wider mb-1 opacity-60 uppercase ml-1">Notas (Alergias, etc)</label>
                    <textarea id="edit-notas" class="w-full bg-white rounded-2xl p-4 h-24 focus:outline-none border border-texto-oscuro/10 focus:border-texto-oscuro/30 shadow-sm text-[15px] text-texto-oscuro"></textarea>
                </div>
                <button type="button" id="btn-guardar-edicion" onclick="guardarEdicion()" class="w-full bg-texto-oscuro text-tarjeta font-bold py-4 rounded-3xl shadow-md hover:bg-texto-oscuro/90 transition mt-6 text-lg">
                    Guardar Cambios
                </button>
            </form>
        </div>
    </div>

    <script>
        // ⚠️ PEGA AQUÍ TU URL DE GOOGLE APPS SCRIPT
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwDAaQN5JrQp8-OS3SwbuhgP8PSZ4v0p8CsTHbWjeB65vdeSde0tCBy3adj9R6yffta/exec"; 
        
        let datosGlobales = []; 
        let ordenActual = 'registro'; 
        let filtroEstatus = 'Todos'; 
        let avataresAleatorios = []; 
        const TONOS_ROSA = ['bg-[#FDF7F4]','bg-[#F9E0E0]','bg-[#F2D6D6]','bg-[#F5CACA]','bg-[#EFC2C2]'];

        async function cargarDatos() {
            document.getElementById('lista-invitados').innerHTML = '<p class="text-center text-sm opacity-60 py-10 font-bold animate-pulse">Sincronizando registros...</p>';
            try {
                let res = await fetch(SCRIPT_URL);
                datosGlobales = await res.json();
                
                let confirmados = datosGlobales.filter(i => i.estatus === 'Asiste' && String(i.nombre || "").trim() !== "");
                avataresAleatorios = [...confirmados].sort(() => 0.5 - Math.random()).slice(0, 3);
                
                renderizarPantalla();
            } catch (error) {
                console.error(error);
                document.getElementById('lista-invitados').innerHTML = '<p class="text-center text-sm text-alerta-roja font-bold py-10">Error de conexión. Intenta recargar.</p>';
            }
        }

        function descargarExcel() {
            let asisten = datosGlobales.filter(i => i.estatus === 'Asiste' && String(i.nombre || "").trim() !== "");
            if(asisten.length === 0) { alert("No hay asistentes confirmados."); return; }

            let csvContent = "\uFEFFNombre del Titular,Lugares Reservados,Acompanantes,Notas\n";
            asisten.forEach(inv => {
                let titular = `"${String(inv.nombre || "").replace(/"/g, '""')}"`;
                let lugares = inv.totalPersonas;
                let acompanantesStr = "";
                if(inv.nombresAcompanantes && inv.nombresAcompanantes.length > 0) {
                    acompanantesStr = inv.nombresAcompanantes.filter(n=>n).join(" | ");
                } else if(inv.acompanantesNumero > 0) {
                    acompanantesStr = `+${inv.acompanantesNumero} sin nombre`;
                }
                let acompanantes = `"${acompanantesStr.replace(/"/g, '""')}"`;
                let notas = `"${String(inv.notas || "").replace(/"/g, '""')}"`;
                csvContent += `${titular},${lugares},${acompanantes},${notas}\n`;
            });

            let blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
            let link = document.createElement("a");
            if (link.download !== undefined) {
                let url = URL.createObjectURL(blob);
                link.setAttribute("href", url);
                link.setAttribute("download", "Asistentes_XV_Hanna.csv");
                link.style.visibility = 'hidden';
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
            }
        }

        // PULL TO REFRESH
        let startY = 0; let currentY = 0; let isPulling = false;
        const ptrIndicator = document.getElementById('pull-to-refresh');
        const ptrIcon = document.getElementById('ptr-icon');
        const ptrText = document.getElementById('ptr-text');

        document.addEventListener('touchstart', e => {
            if (window.scrollY === 0) {
                startY = e.touches[0].clientY;
                isPulling = true;
                ptrIcon.style.transform = 'rotate(0deg)';
                ptrText.innerText = "Desliza para actualizar...";
            }
        });
        document.addEventListener('touchmove', e => {
            if (!isPulling) return;
            currentY = e.touches[0].clientY;
            let pullDistance = currentY - startY;
            if (pullDistance > 0) {
                if(e.cancelable) e.preventDefault(); 
                let alturaVisible = Math.min(pullDistance / 2, 70); 
                ptrIndicator.style.height = alturaVisible + 'px';
                if (alturaVisible >= 60) {
                    ptrIcon.style.transform = 'rotate(180deg)';
                    ptrText.innerText = "Suelta para actualizar";
                } else {
                    ptrIcon.style.transform = 'rotate(0deg)';
                    ptrText.innerText = "Desliza para actualizar...";
                }
            }
        }, { passive: false });
        document.addEventListener('touchend', e => {
            if (!isPulling) return;
            isPulling = false;
            let pullDistance = currentY - startY;
            if (pullDistance / 2 >= 60) {
                ptrIndicator.style.height = '50px';
                ptrIcon.innerHTML = '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path>'; 
                ptrIcon.classList.add('animate-spin');
                ptrText.innerText = "Actualizando...";
                cargarDatos().then(() => {
                    setTimeout(() => {
                        ptrIndicator.style.height = '0px';
                        setTimeout(() => {
                            ptrIcon.classList.remove('animate-spin');
                            ptrIcon.innerHTML = '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M19 14l-7 7m0 0l-7-7m7 7V3"></path>';
                        }, 200);
                    }, 500); 
                });
            } else { ptrIndicator.style.height = '0px'; }
            startY = 0; currentY = 0;
        });

        function manejarBusqueda() {
            let input = document.getElementById('buscador').value;
            let btnX = document.getElementById('btn-borrar-busqueda');
            if (input.length > 0) btnX.classList.remove('hidden');
            else btnX.classList.add('hidden');
            renderizarPantalla();
        }

        function limpiarBusqueda() {
            document.getElementById('buscador').value = '';
            document.getElementById('btn-borrar-busqueda').classList.add('hidden');
            renderizarPantalla();
        }

        function filtrarPorEstatus(estatus) {
            if(filtroEstatus === estatus) filtroEstatus = 'Todos';
            else filtroEstatus = estatus;
            renderizarPantalla();
        }

        function alternarOrden() {
            const btn = document.getElementById('btn-orden');
            if (ordenActual === 'registro') {
                ordenActual = 'alfabetico';
                btn.innerHTML = '<span class="font-black text-[15px] opacity-70 tracking-tighter">A-Z</span>';
            } else if (ordenActual === 'alfabetico') {
                ordenActual = 'duplicados';
                btn.innerHTML = '<svg class="w-6 h-6 text-advertencia" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path></svg>';
            } else {
                ordenActual = 'registro';
                btn.innerHTML = '<svg class="w-6 h-6 opacity-70" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>';
            }
            renderizarPantalla();
        }

        function toggleDetalles(fila) {
            const contenedor = document.getElementById(`detalles-${fila}`);
            const flecha = document.getElementById(`flecha-${fila}`);
            if (contenedor.style.maxHeight && contenedor.style.maxHeight !== '0px') {
                contenedor.style.maxHeight = '0px';
                contenedor.style.opacity = '0';
                flecha.style.transform = 'rotate(0deg)';
                setTimeout(() => contenedor.classList.add('hidden'), 300); 
            } else {
                contenedor.classList.remove('hidden');
                setTimeout(() => {
                    contenedor.style.maxHeight = contenedor.scrollHeight + "px";
                    contenedor.style.opacity = '1';
                    flecha.style.transform = 'rotate(180deg)';
                }, 10);
            }
        }

        function normalizarTexto(texto) {
            return String(texto || "").toLowerCase().trim().normalize("NFD").replace(/[\u0300-\u036f]/g, "");
        }

        function nombresSimilares(n1, n2) {
            if(n1 === n2) return true;
            
            let w1 = n1.split(" ").filter(w => w.length > 2);
            let w2 = n2.split(" ").filter(w => w.length > 2);
            
            if(w1.length === 0 || w2.length === 0) return false;

            let primerNombre1 = w1[0];
            let primerNombre2 = w2[0];

            let p1EnP2 = w2.some(w => w === primerNombre1 || primerNombre1.includes(w) || w.includes(primerNombre1));
            let p2EnP1 = w1.some(w => w === primerNombre2 || primerNombre2.includes(w) || w.includes(primerNombre2));

            if (!p1EnP2 && !p2EnP1) return false; 
            
            let matches = 0;
            w1.forEach(palabra1 => {
                if(w2.some(palabra2 => palabra1 === palabra2 || palabra1.includes(palabra2) || palabra2.includes(palabra1))) {
                    matches++;
                }
            });

            let minWords = Math.min(w1.length, w2.length);
            let maxWords = Math.max(w1.length, w2.length);
            let coincidencia = matches / minWords;

            return coincidencia >= 0.6 && (matches >= 2 || (maxWords === 1 && matches === 1));
        }

        function renderizarPantalla() {
            let terminoBusqueda = document.getElementById('buscador').value.toLowerCase();
            let listaHTML = '';
            
            let totalPersonasAsisten = 0;
            let totalCancelados = 0;

            let datosValidos = datosGlobales.filter(inv => String(inv.nombre || "").trim() !== "");

            let directorioGlobal = [];
            datosValidos.forEach(inv => {
                let titularNorm = normalizarTexto(inv.nombre);
                if(titularNorm) directorioGlobal.push({ fila: inv.fila, nombreNorm: titularNorm, original: inv.nombre });
                
                if(inv.nombresAcompanantes) {
                    inv.nombresAcompanantes.forEach(nom => {
                        let acompNorm = normalizarTexto(nom);
                        if(acompNorm) directorioGlobal.push({ fila: inv.fila, nombreNorm: acompNorm, original: nom });
                    });
                }
            });

            datosValidos.forEach(inv => {
                if (inv.estatus === 'Asiste') totalPersonasAsisten += inv.totalPersonas;
                else totalCancelados += 1;

                inv.tieneDuplicado = false;
                inv.detalleDuplicado = [];

                let misNombres = [];
                let titularNorm = normalizarTexto(inv.nombre);
                if(titularNorm) misNombres.push({norm: titularNorm, orig: inv.nombre});

                if (inv.nombresAcompanantes) {
                    inv.nombresAcompanantes.forEach(n => {
                        let norm = normalizarTexto(n);
                        if(norm) misNombres.push({norm: norm, orig: n});
                    });
                }

                // 🟢 NOTA: BÚSQUEDA INTERNA ARREGLADA (Usando Fuzzy Matching en lugar de Exacto)
                for(let i = 0; i < misNombres.length; i++) {
                    for(let j = i + 1; j < misNombres.length; j++) {
                        if(nombresSimilares(misNombres[i].norm, misNombres[j].norm)) {
                            inv.tieneDuplicado = true;
                            // Identificamos quién es el que está duplicado
                            let msg = `Duplicado en la misma familia: ${misNombres[i].orig}`;
                            if(!inv.detalleDuplicado.includes(msg)) {
                                inv.detalleDuplicado.push(msg);
                            }
                        }
                    }
                }

                // BÚSQUEDA GLOBAL
                misNombres.forEach(miN => {
                    directorioGlobal.forEach(global => {
                        if(global.fila !== inv.fila && nombresSimilares(miN.norm, global.nombreNorm)) {
                            inv.tieneDuplicado = true;
                            let msg = `Choca con: ${global.original} (en otro registro)`;
                            if(inv.detalleDuplicado.length < 3 && !inv.detalleDuplicado.includes(msg)) {
                                inv.detalleDuplicado.push(msg);
                            }
                        }
                    });
                });
            });

            let avataresHTML = '';
            if(avataresAleatorios.length > 0) {
                let zIndexes = ['z-30', 'z-20', 'z-10'];
                avataresAleatorios.forEach((inv, i) => {
                    let inicial = String(inv.nombre || " ").substring(0,1).toUpperCase();
                    let colorTarjeta = TONOS_ROSA[i % TONOS_ROSA.length];
                    avataresHTML += `
                        <div class="w-8 h-8 rounded-full border-[3px] border-tarjeta-fuerte ${colorTarjeta} flex items-center justify-center text-[11px] font-bold text-texto-oscuro shadow-sm relative ${zIndexes[i]}">
                            ${inicial}
                        </div>
                    `;
                });
                if(totalPersonasAsisten > avataresAleatorios.length) {
                    let extras = totalPersonasAsisten - avataresAleatorios.length;
                    avataresHTML += `
                        <div class="w-8 h-8 rounded-full border-[3px] border-tarjeta-fuerte bg-white flex items-center justify-center text-[10px] font-extrabold text-texto-oscuro shadow-sm relative z-0">
                            +${extras}
                        </div>
                    `;
                }
                avataresHTML += `<span class="text-[11px] font-bold text-texto-oscuro/60 ml-3 tracking-widest uppercase">Confirmados</span>`;
            }
            document.getElementById('avatares-confirmados').innerHTML = avataresHTML;

            let datosFiltrados = datosValidos.filter(inv => {
                let nombreLimpio = String(inv.nombre || "").toLowerCase();
                let coincideTitular = nombreLimpio.includes(terminoBusqueda);
                let coincideAcompanante = false;
                
                if (inv.nombresAcompanantes && Array.isArray(inv.nombresAcompanantes)) {
                    coincideAcompanante = inv.nombresAcompanantes.some(nom => String(nom || "").toLowerCase().includes(terminoBusqueda));
                }
                return coincideTitular || coincideAcompanante;
            });

            if (filtroEstatus !== 'Todos') datosFiltrados = datosFiltrados.filter(inv => inv.estatus === filtroEstatus);

            if (ordenActual === 'duplicados') {
                datosFiltrados = datosFiltrados.filter(inv => inv.tieneDuplicado);
                datosFiltrados.sort((a, b) => b.fila - a.fila);
            } else if (ordenActual === 'alfabetico') {
                datosFiltrados.sort((a, b) => String(a.nombre || "").localeCompare(String(b.nombre || ""), 'es', { sensitivity: 'base' }));
            } else {
                datosFiltrados.sort((a, b) => b.fila - a.fila);
            }

            const cardAsiste = document.getElementById('card-asiste');
            const cardNoAsiste = document.getElementById('card-no-asiste');
            const badgeAsiste = document.getElementById('badge-asiste');
            const badgeNoAsiste = document.getElementById('badge-no-asiste');
            const flechaAsiste = document.getElementById('flecha-asiste');
            const flechaNoAsiste = document.getElementById('flecha-no-asiste');
            const tituloLista = document.getElementById('titulo-lista');

            if (filtroEstatus === 'Asiste') {
                cardAsiste.classList.add('ring-4', 'ring-white/60');
                cardAsiste.classList.remove('opacity-50', 'scale-[0.98]');
                badgeAsiste.classList.remove('hidden');
                flechaAsiste.classList.add('hidden');
                cardNoAsiste.classList.add('opacity-50', 'scale-[0.98]');
                cardNoAsiste.classList.remove('ring-4', 'ring-white/60');
                badgeNoAsiste.classList.add('hidden');
                flechaNoAsiste.classList.remove('hidden');
                
                if (ordenActual === 'duplicados') tituloLista.innerText = "Confirmados c/ Duplicados";
                else tituloLista.innerText = "Confirmados (Sí Asisten)";
                
            } else if (filtroEstatus === 'No Asiste') {
                cardNoAsiste.classList.add('ring-4', 'ring-white/60');
                cardNoAsiste.classList.remove('opacity-50', 'scale-[0.98]');
                badgeNoAsiste.classList.remove('hidden');
                flechaNoAsiste.classList.add('hidden');
                cardAsiste.classList.add('opacity-50', 'scale-[0.98]');
                cardAsiste.classList.remove('ring-4', 'ring-white/60');
                badgeAsiste.classList.add('hidden');
                flechaAsiste.classList.remove('hidden');
                
                if (ordenActual === 'duplicados') tituloLista.innerText = "Cancelados c/ Duplicados";
                else tituloLista.innerText = "Cancelados (No Asistirán)";
                
            } else {
                cardAsiste.classList.remove('opacity-50', 'scale-[0.98]', 'ring-4', 'ring-white/60');
                cardNoAsiste.classList.remove('opacity-50', 'scale-[0.98]', 'ring-4', 'ring-white/60');
                badgeAsiste.classList.add('hidden');
                badgeNoAsiste.classList.add('hidden');
                flechaAsiste.classList.remove('hidden');
                flechaNoAsiste.classList.remove('hidden');
                
                if (ordenActual === 'duplicados') tituloLista.innerText = "Revisión de Duplicados";
                else tituloLista.innerText = "Registro de Invitados";
            }

            datosFiltrados.forEach(inv => {
                let asiste = inv.estatus === 'Asiste';
                let inicial = String(inv.nombre || " ").substring(0,1).toUpperCase();
                
                let bgIconoStatus = 'bg-texto-oscuro/90';
                let colorIconoStatus = asiste ? 'text-tarjeta-fuerte' : 'text-alerta-roja';
                let svgStatus = asiste 
                    ? '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="3.5" d="M5 13l4 4L19 7"></path>' 
                    : '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="3.5" d="M6 18L18 6M6 6l12 12"></path>';
                
                let bgAvatar = asiste ? 'bg-acento-verde/40' : 'bg-texto-oscuro/5';
                let opacidadGeneral = asiste ? 'opacity-100' : 'opacity-70';

                let indicadorNota = '';
                let notaTexto = String(inv.notas || "").trim();
                if(notaTexto !== '') {
                    indicadorNota = `
                        <div title="Tiene nota" class="bg-fondo-app rounded-full p-1 ml-1.5 shadow-sm border border-white/50">
                            <svg class="w-2.5 h-2.5 text-texto-oscuro/60" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M8 10h.01M12 10h.01M16 10h.01M9 16H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-5l-5 5v-5z"></path></svg>
                        </div>`;
                }

                let indicadorAlerta = inv.tieneDuplicado ? `
                    <div title="Posible nombre duplicado" class="bg-advertencia/20 rounded-full p-1 ml-1 shadow-sm border border-advertencia/50 text-advertencia">
                        <svg class="w-2.5 h-2.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path></svg>
                    </div>` : '';


                let listaAcompHTML = '';
                if(inv.nombresAcompanantes && inv.nombresAcompanantes.length > 0) {
                    inv.nombresAcompanantes.forEach(nom => {
                        let nomLimpio = String(nom || "");
                        let resaltado = (terminoBusqueda !== "" && nomLimpio.toLowerCase().includes(terminoBusqueda)) ? 'bg-white px-2 py-0.5 rounded-md shadow-sm' : '';
                        listaAcompHTML += `<li class="ml-4 mb-1 text-[13px] opacity-80 font-medium text-texto-oscuro"><span class="${resaltado}">• ${nomLimpio}</span></li>`;
                    });
                } else if(inv.acompanantesNumero > 0) {
                    listaAcompHTML += `<li class="ml-4 mb-1 text-[13px] opacity-80 font-medium text-texto-oscuro">• ${inv.acompanantesNumero} acompañante(s) sin nombre</li>`;
                } else {
                    listaAcompHTML += `<li class="ml-4 mb-1 text-[13px] opacity-80 font-medium text-texto-oscuro italic">Sin acompañantes</li>`;
                }

                let notasHTML = '';
                if(notaTexto !== '') {
                    notasHTML = `<div class="bg-fondo-app rounded-[20px] p-3 mb-4 mx-1 border border-white/50"><p class="text-[13px] italic text-texto-oscuro/80">"${notaTexto}"</p></div>`;
                }

                let textoAlerta = inv.detalleDuplicado.join(" <br> ");
                let alertaHTML = inv.tieneDuplicado ? `
                    <div class="bg-advertencia/10 border border-advertencia/40 rounded-xl p-3 mb-3 mx-1 flex items-start gap-2">
                        <svg class="w-4 h-4 text-advertencia flex-shrink-0 mt-0.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path></svg>
                        <p class="text-[11px] text-texto-oscuro/80 font-medium leading-tight"><strong>¡Atención Duplicado!</strong><br>${textoAlerta}</p>
                    </div>
                ` : '';

                listaHTML += `
                    <div class="bg-tarjeta rounded-[45px] shadow-sm border border-white/60 p-4 transition-all duration-300 ${opacidadGeneral}">
                        
                        <div class="flex items-center justify-between cursor-pointer" onclick="toggleDetalles(${inv.fila})">
                            <div class="flex items-center gap-4">
                                <div class="w-14 h-14 rounded-full ${bgAvatar} flex items-center justify-center shadow-inner border border-white/80 flex-shrink-0">
                                    <span class="text-2xl font-bold text-texto-oscuro">${inicial}</span>
                                </div>
                                <div class="max-w-[140px] xs:max-w-[180px]">
                                    <h3 class="font-bold text-[16px] text-texto-oscuro leading-tight truncate">${inv.nombre}</h3>
                                    
                                    <div class="flex items-center mt-0.5">
                                        <p class="text-[12px] text-texto-oscuro/60 font-semibold">${inv.totalPersonas} Persona(s)</p>
                                        ${indicadorNota}
                                        ${indicadorAlerta}
                                    </div>
                                </div>
                            </div>
                            
                            <div class="flex items-center gap-3 mr-2">
                                <div class="w-7 h-7 rounded-full ${bgIconoStatus} flex items-center justify-center shadow-md border border-white/20">
                                    <svg class="w-4 h-4 ${colorIconoStatus}" fill="none" stroke="currentColor" viewBox="0 0 24 24">${svgStatus}</svg>
                                </div>
                                <svg id="flecha-${inv.fila}" class="w-5 h-5 text-texto-oscuro/40 transition-transform duration-300" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M19 9l-7 7-7-7"></path></svg>
                            </div>
                        </div>

                        <div id="detalles-${inv.fila}" class="hidden expand-transition mt-4" style="max-height: 0px; opacity: 0;">
                            <div class="pt-4 border-t border-texto-oscuro/5 mx-2">
                                <p class="text-[10px] font-bold tracking-widest text-texto-oscuro/60 mb-2 uppercase ml-1">Detalles de la familia:</p>
                                
                                ${alertaHTML}

                                <div class="mb-2 ml-1">
                                    <p class="text-[13px] font-bold text-texto-oscuro">Titular: <span class="font-medium opacity-90">${inv.nombre}</span></p>
                                </div>

                                <ul class="mb-4">
                                    ${listaAcompHTML}
                                </ul>
                                ${notasHTML}
                                
                                <button onclick="abrirModal(${inv.fila})" class="w-full bg-fondo-app border border-white text-texto-oscuro font-bold py-3.5 rounded-[25px] shadow-sm flex justify-center items-center gap-2 hover:bg-white transition text-sm">
                                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z"></path></svg>
                                    Editar Registro
                                </button>
                            </div>
                        </div>

                    </div>
                `;
            });

            if (datosFiltrados.length === 0) {
                if(ordenActual === 'duplicados') listaHTML = '<p class="text-center text-sm opacity-60 py-10 font-bold flex flex-col items-center"><svg class="w-10 h-10 mb-2 opacity-50" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg>¡Todo perfecto! No hay duplicados.</p>';
                else listaHTML = '<p class="text-center text-sm opacity-60 py-10 font-bold">No se encontraron invitados.</p>';
            }

            document.getElementById('lista-invitados').innerHTML = listaHTML;
            document.getElementById('stat-total-personas').innerText = totalPersonasAsisten;
            document.getElementById('stat-cancelados').innerText = totalCancelados;
            document.getElementById('contador-resultados').innerText = `${datosFiltrados.length} encontrados`;
        }

        function abrirModal(fila) {
            let inv = datosGlobales.find(i => i.fila === fila);
            if (!inv) return;
            document.getElementById('edit-fila').value = inv.fila;
            document.getElementById('edit-nombre').value = inv.nombre;
            document.getElementById('edit-estatus').value = inv.estatus || 'Asiste';
            document.getElementById('edit-acompanantes').value = inv.acompanantesNumero || 0;
            document.getElementById('edit-notas').value = inv.notas || '';
            window.nombresTemp = inv.nombresAcompanantes || [];
            generarCamposAcompanantes();
            document.getElementById('modal-editar').classList.remove('hidden');
        }

        function cerrarModal() { document.getElementById('modal-editar').classList.add('hidden'); }

        function generarCamposAcompanantes() {
            let num = parseInt(document.getElementById('edit-acompanantes').value) || 0;
            let contenedor = document.getElementById('edit-nombres-acompanantes');
            contenedor.innerHTML = '';
            if (num > 0) {
                contenedor.classList.remove('hidden');
                for (let i = 1; i <= num; i++) {
                    let valorPrevio = window.nombresTemp[i-1] || '';
                    contenedor.innerHTML += `<div class="mb-2"><label class="block text-[9px] font-bold opacity-60 ml-1 mb-1 uppercase">ACOMPAÑANTE ${i}</label><input type="text" id="edit-c${i}" value="${valorPrevio}" class="w-full bg-white rounded-xl p-3 focus:outline-none text-sm border border-white/50 focus:border-texto-oscuro/20 shadow-sm" placeholder="Nombre completo..."></div>`;
                }
            } else { contenedor.classList.add('hidden'); }
        }

        function guardarEdicion() {
            const btn = document.getElementById('btn-guardar-edicion');
            btn.innerText = "Guardando..."; btn.classList.add("opacity-50"); btn.disabled = true;

            let formData = new FormData();
            formData.append("action", "editar");
            formData.append("fila", document.getElementById('edit-fila').value);
            formData.append("nombre", document.getElementById('edit-nombre').value);
            formData.append("estatus", document.getElementById('edit-estatus').value);
            formData.append("notas", document.getElementById('edit-notas').value);
            
            let numAcomp = document.getElementById('edit-acompanantes').value;
            formData.append("acompanantes", numAcomp);
            for(let i=1; i<=numAcomp; i++) formData.append(`c${i}`, document.getElementById(`edit-c${i}`).value);

            fetch(SCRIPT_URL, { method: 'POST', body: formData })
            .then(res => res.text()).then(texto => { cerrarModal(); cargarDatos(); })
            .catch(error => alert("Error al guardar. Revisa tu internet."))
            .finally(() => { btn.innerText = "Guardar Cambios"; btn.classList.remove("opacity-50"); btn.disabled = false; });
        }

        window.onload = cargarDatos;
    </script>
</body>
</html>
